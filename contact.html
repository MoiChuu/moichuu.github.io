<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://trustedscripts.com; style-src 'self' 'unsafe-inline' https://googleapis.com https://fonts.googleapis.com https://jsdelivr.net ; font-src 'self' https://gstatic.com https://fonts.gstatic.com; connect-src 'self' https://formspree.io; form-action 'self' https://formspree.io;">
  <!-- 傳統瀏覽器 -->
  <link rel="shortcut icon" href="assets/favicon/favicon.ico" type="image/x-icon">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon/favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon/favicon-32x32.png">
  <!-- Apple / iOS -->
  <link rel="apple-touch-icon" sizes="180x180" href="assets/favicon/apple-touch-icon.png">
  <!-- Android / PWA -->
  <link rel="manifest" href="assets/favicon/site.webmanifest">
  <meta name="theme-color" content="#fff8e7">
  <title>默黓的記憶櫥窗｜連絡默黓</title>
  <link rel="stylesheet" href="./css/base.css">
  <link rel="stylesheet" href="./css/contact.css">
  <link rel="stylesheet" href="./css/home-btn-base.css">
  <link rel="stylesheet" href="./css/footer-base.css">
  <style>
    /* 匯入字型 */
    @import url('./css/fonts.css');
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC&family=Noto+Serif+TC&display=swap');

    body {
      color: #333;
      background-color: #fff8e7;
      font-family: 'Noto Sans TC', 'Microsoft JhengHei', 'Heiti TC', Arial, sans-serif;
      font-optical-sizing: auto;
      font-weight: 400;
      text-align: center;
      max-width: 800px;
      margin: 40px auto;
    }

    a {
      color: #d9ac9a;
    }

    a:hover {
      color: #FFF;
      background-color: #783535;
    }

    h1 {
      font-family: '851手寫字體', cursive;
      font-size: 80px;
      color: #783535;
      text-shadow: 0 0 0.2em #d9ac9a, 0 0 0.2em #d9ac9a, 0 0 0.2em #d9ac9a;
    }

    .content {
      margin-bottom: 50px;
    }

    #disqus_thread {
      width: 100%;
      max-width: 600px;
      margin: 0 auto;
      padding: 0 10px;
      box-sizing: border-box;
    }

    .note {
      font-family: 'Unifont', 'MS Gothic', '新細明體', 'Noto Sans Mono', monospace;
      font-size: 14px;
    }

    .note-2 {
      font-family: 'LINE Seed TW', 'Noto Sans TC', 'Microsoft JhengHei', 'Heiti TC', Arial, sans-serif;
      font-weight: 400;
      font-size: 18px;
    }

    .home-btn {
      color: #783535;
    }

    .home-btn a:hover {
      color: #000;
    }

    #loadBtn {
      padding: 12px 20px;
      background-color: #783535;
      color: #FFF;
      border: none;
      border-radius: 6px;
      font-family: 'Unifont', 'MS Gothic', '新細明體', 'Noto Sans Mono', monospace;
      font-size: 15px;
      cursor: crosshair;
      transition: 0.2s ease;
    }

    #loadBtn:hover {
      opacity: 0.85;
      transform: translateY(-1px);
    }
  </style>
</head>

<body>

    <header>
      <h1>連絡默黓</h1>
    </header>

    <main>
        <div class="content">
            <p>可以直接在這聯絡我噢 (*´･ч･`*)</p>
        </div>

      <!-- Formspree 表單區 -->
      <div class="contact-container">
        <form action="https://formspree.io/f/xlgvpoll" method="POST" class="tarot-form">
    
            <div class="form-group">
              <label for="name">大名</label>
              <input type="text" id="name" name="name" required placeholder="真名或暱稱都OK">
            </div>

            <div class="form-group">
              <label for="email">電郵</label>
              <input type="email" id="email" name="_replyto" required placeholder="your@email.com">
            </div>

            <div class="form-group">
              <label for="subject">主旨</label>
              <input type="text" id="subject" name="subject" required placeholder="目的是...">
            </div>

            <div class="form-group">
              <label for="message">內容</label>
              <textarea id="message" name="message" rows="5" required placeholder="寫下你想說的話..."></textarea>
            </div>

            <button type="submit" class="submit-btn">點我寄出</button>
        </form>
      </div>
      <p>　</p>
    </main>
    
    <div class="home-btn"><a href="./index.html" title="回首頁">◀ Home</a></div>

    </footer>

    <script src="./js/main.js" defer></script>
</body>
</html>
