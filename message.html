  <style>
    /* 匯入字型 */
    @import url('./css/fonts.css');
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC&family=Noto+Serif+TC&display=swap');

    body {
      color: #333;
      background-color: #fff8e7;
      font-family: 'Noto Sans TC', 'Microsoft JhengHei', 'Heiti TC', Arial, sans-serif;
      font-optical-sizing: auto;
      font-weight: 400;
      text-align: center;
      max-width: 800px;
      margin: 40px auto;
    }

    a {
      color: #d9ac9a;
    }

    a:hover {
      color: #FFF;
      background-color: #783535;
    }

    h1 {
      font-family: 'K字', cursive;
      font-size: 80px;
      color: #783535;
      text-shadow: 0 0 0.2em #d9ac9a, 0 0 0.2em #d9ac9a, 0 0 0.2em #d9ac9a;
    }

    .content {
      margin-bottom: 50px;
    }

    #disqus_thread {
      width: 100%;
      max-width: 600px;
      margin: 0 auto;
      padding: 0 10px;
      box-sizing: border-box;
    }

    .note {
      font-family: 'Unifont', 'MS Gothic', '新細明體', 'Noto Sans Mono', monospace;
      font-size: 14px;
    }

    .note-2 {
      font-family: 'LINE Seed TW', 'Noto Sans TC', 'Microsoft JhengHei', 'Heiti TC', Arial, sans-serif;
      font-weight: 400;
      font-size: 18px;
    }

    .home-btn {
      color: #783535;
    }

    .home-btn a:hover {
      color: #000;
    }

    #loadBtn {
      padding: 12px 20px;
      background-color: #783535;
      color: #FFF;
      border: none;
      border-radius: 6px;
      font-family: 'Unifont', 'MS Gothic', '新細明體', 'Noto Sans Mono', monospace;
      font-size: 15px;
      cursor: crosshair;
      transition: 0.2s ease;
    }

    #loadBtn:hover {
      opacity: 0.85;
      transform: translateY(-1px);
    }
  </style>
</head>

<body>

    <header>
      <h1>留言板</h1>
    </header>

    <main>
      <div class="content">
        <p>歡迎留言噢 (°▹｡ )<br><span class="note">꒰ 留言前請詳閱<a href="./msg-policy.html" target="_blank" title="留言版規範">相關規範</a> ꒱</span></p>
      </div>

      <!-- Disqus 留言區 -->
      <div id="disqus_thread"></div>

      <p class="note-2">本留言區使用 Disqus ，可能會設定第三方 Cookie 。</p>

      <button id="loadBtn">
        我同意並顯示留言
      </button>

      <script src="./js/disqus-loader.js"></script>

      <noscript>本留言區使用<a href="https://disqus.com/?ref_noscript" target="_blank" rel="noreferrer nofollow"> Disqus </a>，需啟用 JavaScript 才能顯示。</noscript>

      <p>　</p>
